<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hell Survival</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #101014;
        color: #f4f1e8;
        font-family: Arial, "Microsoft YaHei", sans-serif;
      }

      #game {
        width: 100%;
        height: 100%;
      }

      #game canvas {
        display: block;
        image-rendering: auto;
      }

      .strategy-editor {
        position: fixed;
        inset: 24px;
        z-index: 1000;
        display: flex;
        flex-direction: column;
        width: auto;
        max-width: none;
        height: calc(100vh - 48px);
        max-height: calc(100vh - 48px);
        overflow: hidden;
        padding: 18px;
        box-sizing: border-box;
        background: rgba(18, 18, 22, 0.94);
        border: 1px solid #5a554c;
        color: #f4f1e8;
      }

      .strategy-editor textarea {
        width: 100%;
        flex: 1 1 180px;
        min-height: 120px;
        box-sizing: border-box;
        resize: vertical;
        background: #0d0d11;
        border: 1px solid #5a554c;
        color: #e8e1d4;
        font: 14px/1.45 Consolas, "Courier New", monospace;
        padding: 12px;
      }

      .strategy-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        flex: 0 0 auto;
        margin-top: 12px;
        padding-top: 8px;
        border-top: 1px solid rgba(140, 128, 108, 0.28);
      }

      .strategy-config {
        flex: 0 1 auto;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 10px;
        max-height: 32vh;
        margin-bottom: 12px;
        overflow: auto;
        padding-right: 4px;
      }

      .strategy-config-group {
        padding: 12px;
        border: 1px solid #3e3a34;
        background: rgba(13, 13, 17, 0.72);
      }

      .strategy-config-title {
        margin-bottom: 10px;
        color: #f2eee2;
        font-size: 14px;
      }

      .strategy-config-fields {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
        gap: 10px;
      }

      .strategy-config-fields-single {
        grid-template-columns: 1fr;
      }

      .strategy-rule-row {
        display: grid;
        grid-template-columns: minmax(86px, 0.8fr) minmax(120px, 1fr) minmax(120px, 1fr) minmax(96px, 0.8fr);
        gap: 10px;
        align-items: end;
        grid-column: 1 / -1;
        padding: 8px 0;
        border-top: 1px solid rgba(90, 85, 76, 0.45);
      }

      .strategy-rule-row:first-child {
        border-top: 0;
        padding-top: 0;
      }

      .strategy-rule-event {
        color: #f2eee2;
        font-size: 13px;
        line-height: 34px;
        white-space: nowrap;
      }

      .strategy-rule-empty {
        padding: 10px 0;
        color: #8f887b;
        font-size: 13px;
      }

      .strategy-config label {
        display: grid;
        gap: 5px;
        color: #c9c1b1;
        font-size: 13px;
      }

      .strategy-config input,
      .strategy-config select {
        box-sizing: border-box;
        width: 100%;
        padding: 8px;
        border: 1px solid #5a554c;
        background: #0d0d11;
        color: #f4f1e8;
      }

      .strategy-editor button {
        padding: 9px 16px;
        border: 1px solid #8c806c;
        background: #2b292f;
        color: #f4f1e8;
        cursor: pointer;
      }

      .strategy-editor button:hover {
        background: #3a3740;
      }

      .strategy-editor .error {
        min-height: 22px;
        margin-top: 10px;
        color: #ff9d8f;
        font: 13px/1.4 Consolas, "Courier New", monospace;
      }

      .game-dom-panel {
        position: fixed;
        inset: 24px;
        z-index: 900;
        display: flex;
        flex-direction: column;
        gap: 18px;
        overflow: hidden;
        box-sizing: border-box;
        padding: 24px;
        background: rgba(18, 18, 22, 0.97);
        border: 1px solid #5a554c;
        color: #f4f1e8;
        font: 15px/1.55 Arial, "Microsoft YaHei", sans-serif;
      }

      .game-dom-header h1 {
        margin: 0 0 8px;
        font-size: 30px;
        line-height: 1.2;
        font-weight: 700;
      }

      .game-dom-header p {
        margin: 0;
        color: #8f887b;
      }

      .game-dom-panel h2 {
        margin: 0 0 8px;
        font-size: 18px;
        line-height: 1.35;
        color: #f2eee2;
      }

      .startup-error-panel {
        z-index: 1200;
      }

      .startup-error-panel pre {
        min-height: 0;
        overflow: auto;
        white-space: pre-wrap;
        padding: 14px;
        border: 1px solid #5a554c;
        background: rgba(8, 8, 10, 0.78);
        color: #ffb3a8;
        font: 13px/1.45 Consolas, "Courier New", monospace;
      }

      .game-dom-footer {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        margin-top: auto;
        color: #8f887b;
        font-size: 14px;
      }

      .codex-entries,
      .return-grid {
        min-height: 0;
        overflow: auto;
      }

      .codex-entry {
        padding: 14px 0;
        border-bottom: 1px solid rgba(140, 128, 108, 0.35);
      }

      .codex-entry h2 {
        margin-bottom: 4px;
      }

      .codex-entry h2 span {
        color: #8f887b;
        font-size: 13px;
        font-weight: 400;
      }

      .codex-entry .meta,
      .summary-line,
      .muted {
        color: #8f887b;
      }

      .return-grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(280px, 0.9fr);
        gap: 28px;
      }

      .return-grid section {
        min-width: 0;
      }

      .player-summary-list {
        display: grid;
        gap: 5px;
        margin: 8px 0 18px;
      }

      .return-events-section {
        min-height: 0;
        overflow: auto;
        border-top: 1px solid rgba(140, 128, 108, 0.35);
        padding-top: 14px;
      }

      .item-list,
      .event-list {
        display: grid;
        gap: 6px;
        margin: 8px 0 18px;
      }

      .event-list {
        color: #d8d0c0;
        font-size: 14px;
      }

      .identify-line {
        color: #ffd98a;
      }

      .success {
        color: #99ffd8 !important;
      }

      .danger {
        color: #ff9d8f !important;
      }

      .storage-panel {
        gap: 14px;
      }

      .storage-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 18px;
      }

      .storage-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .storage-actions button,
      .equipment-slot,
      .storage-item,
      .skill-choice {
        border: 1px solid #5a554c;
        background: #15151b;
        color: #f4f1e8;
        cursor: pointer;
      }

      .storage-actions button {
        min-height: 34px;
        padding: 8px 12px;
      }

      .storage-actions button:hover,
      .equipment-slot:hover,
      .storage-item:hover,
      .skill-choice:hover {
        border-color: #a99c84;
        background: #1f1f27;
      }

      .storage-layout {
        display: grid;
        grid-template-columns: minmax(320px, 0.95fr) minmax(280px, 0.9fr) minmax(340px, 1.05fr);
        gap: 18px;
        min-height: 0;
        flex: 1 1 auto;
      }

      .equipment-board,
      .storage-list-panel,
      .character-attributes-panel {
        min-width: 0;
        min-height: 0;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .section-title {
        color: #f2eee2;
        font-size: 15px;
        font-weight: 700;
      }

      .equipment-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }

      .equipment-slot {
        aspect-ratio: 1.08;
        display: grid;
        align-content: space-between;
        gap: 6px;
        padding: 10px;
        text-align: left;
        border-radius: 6px;
      }

      .equipment-slot.is-empty {
        color: #8f887b;
        border-style: dashed;
        background: rgba(13, 13, 17, 0.68);
      }

      .slot-name,
      .storage-item-sub,
      .tooltip-meta {
        color: #8f887b;
        font-size: 12px;
      }

      .slot-empty {
        color: #5f5a51;
        font-size: 18px;
      }

      .item-name {
        font-size: 14px;
        line-height: 1.3;
      }

      .item-meta {
        color: #c9c1b1;
        font-size: 12px;
      }

      .storage-list {
        display: grid;
        gap: 8px;
        min-height: 0;
        overflow: auto;
        padding-right: 4px;
      }

      .storage-item {
        display: grid;
        gap: 5px;
        padding: 10px;
        text-align: left;
        border-radius: 6px;
      }

      .storage-item-main {
        display: flex;
        justify-content: space-between;
        gap: 10px;
      }

      .storage-item.is-selected {
        border-color: #f2eee2;
      }

      .storage-item.is-equipped {
        background: #202016;
      }

      .item-tooltip {
        position: absolute;
        z-index: 10;
        width: min(360px, calc(100vw - 36px));
        pointer-events: none;
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding: 12px;
        border: 1px solid #786e5f;
        background: rgba(13, 13, 17, 0.96);
        border-radius: 6px;
        box-shadow: 0 16px 36px rgba(0, 0, 0, 0.46);
      }

      .item-tooltip[hidden] {
        display: none;
      }

      .tooltip-title {
        font-size: 18px;
        font-weight: 700;
      }

      .item-warning {
        color: #ffcf8a;
        font-size: 13px;
      }

      .attribute-list {
        display: grid;
        align-content: start;
        gap: 8px;
        min-height: 0;
        overflow: auto;
        padding: 12px;
        border: 1px solid #3e3a34;
        background: rgba(13, 13, 17, 0.72);
        border-radius: 6px;
      }

      .build-config {
        flex: 1 1 34%;
        min-height: 0;
        overflow: auto;
        display: flex;
        flex-direction: column;
        gap: 8px;
        padding: 12px;
        border: 1px solid #3e3a34;
        background: rgba(13, 13, 17, 0.72);
        border-radius: 6px;
      }

      .skill-slot {
        border: 1px solid rgba(140, 128, 108, 0.35);
        border-radius: 6px;
        background: rgba(21, 21, 27, 0.86);
      }

      .skill-slot-header {
        min-height: 38px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 8px 10px;
        border-bottom: 1px solid rgba(140, 128, 108, 0.22);
      }

      .skill-slot-label {
        color: #c9c1b1;
        font-size: 13px;
      }

      .skill-slot-current {
        color: #f4f1e8;
        font-size: 14px;
        text-align: right;
      }

      .skill-choice-list {
        display: grid;
        gap: 6px;
        max-height: 100%;
        overflow: auto;
        padding: 8px;
      }

      .skill-choice {
        display: grid;
        gap: 3px;
        width: 100%;
        padding: 8px 10px;
        text-align: left;
        border-radius: 6px;
      }

      .skill-choice.is-selected {
        border-color: #76e0a6;
        background: rgba(35, 69, 53, 0.58);
      }

      .skill-choice-tags {
        color: #8f887b;
        font-size: 11px;
      }

      .skill-config-panel {
        gap: 14px;
      }

      .skill-config-layout {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 14px;
        min-height: 0;
        flex: 1 1 auto;
        overflow: auto;
      }

      .skill-config-card {
        min-width: 0;
        min-height: 0;
      }

      .skill-config-card .skill-slot {
        height: 100%;
        overflow: auto;
      }

      .skill-tooltip {
        position: absolute;
        z-index: 10;
        width: min(360px, calc(100vw - 36px));
        pointer-events: none;
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding: 12px;
        border: 1px solid #6f8066;
        background: rgba(13, 17, 15, 0.97);
        border-radius: 6px;
        box-shadow: 0 16px 36px rgba(0, 0, 0, 0.46);
      }

      .skill-tooltip[hidden] {
        display: none;
      }

      .skill-tooltip-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .skill-tooltip-tags span {
        padding: 3px 7px;
        border: 1px solid rgba(118, 224, 166, 0.28);
        background: rgba(118, 224, 166, 0.08);
        color: #9ff0bf;
        border-radius: 4px;
        font-size: 12px;
      }

      .skill-tooltip-description {
        color: #f4f1e8;
        font-size: 14px;
        line-height: 1.55;
      }

      .attribute-row {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 12px;
        padding-bottom: 7px;
        border-bottom: 1px solid rgba(140, 128, 108, 0.18);
        font-size: 14px;
      }

      .attribute-row:last-child {
        border-bottom: 0;
        padding-bottom: 0;
      }

      .attribute-value {
        white-space: nowrap;
      }

      .attribute-base {
        color: #f4f1e8;
      }

      .attribute-bonus {
        color: #76e0a6;
      }

      .affix-list {
        display: grid;
        gap: 7px;
        min-height: 0;
        overflow: auto;
      }

      .affix-row {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        padding: 7px 0;
        border-bottom: 1px solid rgba(140, 128, 108, 0.2);
        font-size: 14px;
      }

      .base-affix-row {
        align-items: center;
        padding: 7px 9px;
        border: 1px solid rgba(255, 209, 102, 0.18);
        border-left: 3px solid #ffd166;
        background: rgba(255, 209, 102, 0.08);
        color: #f6df9b;
        border-radius: 4px;
      }

      .base-affix-row span:last-child {
        color: #fff1c2;
        font-weight: 700;
      }

      .empty-state {
        color: #8f887b;
        padding: 10px 0;
      }

      .quality-normal {
        border-color: #c9c1b1;
      }

      .quality-text-normal {
        color: #c9c1b1;
      }

      .quality-magic {
        border-color: #4f8cff;
      }

      .quality-text-magic {
        color: #6ea2ff;
      }

      .quality-rare {
        border-color: #ffc857;
      }

      .quality-text-rare {
        color: #ffc857;
      }

      .quality-epic {
        border-color: #9f7aea;
      }

      .quality-text-epic {
        color: #b997ff;
      }

      .quality-legendary {
        border-color: #ff9f43;
      }

      .quality-text-legendary {
        color: #ffb45f;
      }

      @media (max-width: 980px) {
        .storage-layout {
          grid-template-columns: 1fr;
          overflow: auto;
        }

        .equipment-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .skill-config-layout {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
