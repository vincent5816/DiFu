<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>地府生存指下</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #101014;
        color: #f4f1e8;
        font-family: Arial, "Microsoft YaHei", sans-serif;
      }

      #game {
        width: 100%;
        height: 100%;
      }

      #game canvas {
        display: block;
      }

      .strategy-editor {
        position: fixed;
        inset: 24px;
        z-index: 1000;
        display: flex;
        flex-direction: column;
        width: auto;
        max-width: none;
        max-height: calc(100vh - 48px);
        overflow: hidden;
        padding: 18px;
        box-sizing: border-box;
        background: rgba(18, 18, 22, 0.94);
        border: 1px solid #5a554c;
        color: #f4f1e8;
      }

      .strategy-editor textarea {
        width: 100%;
        flex: 1;
        min-height: 120px;
        box-sizing: border-box;
        resize: vertical;
        background: #0d0d11;
        border: 1px solid #5a554c;
        color: #e8e1d4;
        font: 14px/1.45 Consolas, "Courier New", monospace;
        padding: 12px;
      }

      .strategy-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        flex: 0 0 auto;
        margin-top: 12px;
      }

      .strategy-config {
        flex: 0 0 auto;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 10px;
        margin-bottom: 12px;
      }

      .strategy-config-group {
        padding: 12px;
        border: 1px solid #3e3a34;
        background: rgba(13, 13, 17, 0.72);
      }

      .strategy-config-title {
        margin-bottom: 10px;
        color: #f2eee2;
        font-size: 14px;
      }

      .strategy-config-fields {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
        gap: 10px;
      }

      .strategy-rule-row {
        display: grid;
        grid-template-columns: minmax(86px, 0.8fr) minmax(120px, 1fr) minmax(120px, 1fr) minmax(96px, 0.8fr);
        gap: 10px;
        align-items: end;
        grid-column: 1 / -1;
        padding: 8px 0;
        border-top: 1px solid rgba(90, 85, 76, 0.45);
      }

      .strategy-rule-row:first-child {
        border-top: 0;
        padding-top: 0;
      }

      .strategy-rule-event {
        color: #f2eee2;
        font-size: 13px;
        line-height: 34px;
        white-space: nowrap;
      }

      .strategy-config label {
        display: grid;
        gap: 5px;
        color: #c9c1b1;
        font-size: 13px;
      }

      .strategy-config input,
      .strategy-config select {
        box-sizing: border-box;
        width: 100%;
        padding: 8px;
        border: 1px solid #5a554c;
        background: #0d0d11;
        color: #f4f1e8;
      }

      .strategy-editor button {
        padding: 9px 16px;
        border: 1px solid #8c806c;
        background: #2b292f;
        color: #f4f1e8;
        cursor: pointer;
      }

      .strategy-editor button:hover {
        background: #3a3740;
      }

      .strategy-editor .error {
        min-height: 22px;
        margin-top: 10px;
        color: #ff9d8f;
        font: 13px/1.4 Consolas, "Courier New", monospace;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>

    <script src="core/AgentRunner.js"></script>
    <script src="core/StrategyConfig.js"></script>
    <script src="core/StrategyCompiler.js"></script>
    <script src="core/StateSnapshot.js"></script>
    <script src="core/EventSystem.js"></script>
    <script src="core/CommandExecutor.js"></script>

    <script src="data/enemies/enemies.js"></script>
    <script src="data/player/player.js"></script>
    <script src="data/floors/floor1.js"></script>

    <script src="systems/CombatSystem.js"></script>
    <script src="systems/InventorySystem.js"></script>
    <script src="systems/HazardSystem.js"></script>
    <script src="systems/LootSystem.js"></script>
    <script src="systems/MapSystem.js"></script>
    <script src="systems/MovementSystem.js"></script>
    <script src="systems/ProgressSystem.js"></script>
    <script src="systems/RunRecorder.js"></script>
    <script src="systems/SettlementSystem.js"></script>
    <script src="systems/StorageSystem.js"></script>
    <script src="ui/HUD.js"></script>
    <script src="ui/ReplayFormatter.js"></script>

    <script src="scenes/BootScene.js"></script>
    <script src="scenes/MenuScene.js"></script>
    <script src="scenes/DungeonScene.js"></script>
    <script src="scenes/ReturnScene.js"></script>
    <script src="scenes/ReplayScene.js"></script>
    <script src="scenes/CodexScene.js"></script>
    <script src="scenes/StorageScene.js"></script>

    <script src="game.js"></script>
  </body>
</html>
