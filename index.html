<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>地府生存指下</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #101014;
        color: #f4f1e8;
        font-family: Arial, "Microsoft YaHei", sans-serif;
      }

      #game {
        width: 100%;
        height: 100%;
      }

      #game canvas {
        display: block;
      }

      .strategy-editor {
        position: fixed;
        inset: 24px;
        z-index: 1000;
        display: flex;
        flex-direction: column;
        width: auto;
        max-width: none;
        height: calc(100vh - 48px);
        max-height: calc(100vh - 48px);
        overflow: hidden;
        padding: 18px;
        box-sizing: border-box;
        background: rgba(18, 18, 22, 0.94);
        border: 1px solid #5a554c;
        color: #f4f1e8;
      }

      .strategy-editor textarea {
        width: 100%;
        flex: 1 1 180px;
        min-height: 120px;
        box-sizing: border-box;
        resize: vertical;
        background: #0d0d11;
        border: 1px solid #5a554c;
        color: #e8e1d4;
        font: 14px/1.45 Consolas, "Courier New", monospace;
        padding: 12px;
      }

      .strategy-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        flex: 0 0 auto;
        margin-top: 12px;
        padding-top: 8px;
        border-top: 1px solid rgba(140, 128, 108, 0.28);
      }

      .strategy-config {
        flex: 0 1 auto;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 10px;
        max-height: 32vh;
        margin-bottom: 12px;
        overflow: auto;
        padding-right: 4px;
      }

      .strategy-config-group {
        padding: 12px;
        border: 1px solid #3e3a34;
        background: rgba(13, 13, 17, 0.72);
      }

      .strategy-config-title {
        margin-bottom: 10px;
        color: #f2eee2;
        font-size: 14px;
      }

      .strategy-config-fields {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
        gap: 10px;
      }

      .strategy-config-fields-single {
        grid-template-columns: 1fr;
      }

      .strategy-rule-row {
        display: grid;
        grid-template-columns: minmax(86px, 0.8fr) minmax(120px, 1fr) minmax(120px, 1fr) minmax(96px, 0.8fr);
        gap: 10px;
        align-items: end;
        grid-column: 1 / -1;
        padding: 8px 0;
        border-top: 1px solid rgba(90, 85, 76, 0.45);
      }

      .strategy-rule-row:first-child {
        border-top: 0;
        padding-top: 0;
      }

      .strategy-rule-event {
        color: #f2eee2;
        font-size: 13px;
        line-height: 34px;
        white-space: nowrap;
      }

      .strategy-rule-empty {
        padding: 10px 0;
        color: #8f887b;
        font-size: 13px;
      }

      .strategy-config label {
        display: grid;
        gap: 5px;
        color: #c9c1b1;
        font-size: 13px;
      }

      .strategy-config input,
      .strategy-config select {
        box-sizing: border-box;
        width: 100%;
        padding: 8px;
        border: 1px solid #5a554c;
        background: #0d0d11;
        color: #f4f1e8;
      }

      .strategy-editor button {
        padding: 9px 16px;
        border: 1px solid #8c806c;
        background: #2b292f;
        color: #f4f1e8;
        cursor: pointer;
      }

      .strategy-editor button:hover {
        background: #3a3740;
      }

      .strategy-editor .error {
        min-height: 22px;
        margin-top: 10px;
        color: #ff9d8f;
        font: 13px/1.4 Consolas, "Courier New", monospace;
      }

      .game-dom-panel {
        position: fixed;
        inset: 24px;
        z-index: 900;
        display: flex;
        flex-direction: column;
        gap: 18px;
        overflow: hidden;
        box-sizing: border-box;
        padding: 24px;
        background: rgba(18, 18, 22, 0.97);
        border: 1px solid #5a554c;
        color: #f4f1e8;
        font: 15px/1.55 Arial, "Microsoft YaHei", sans-serif;
      }

      .game-dom-header h1 {
        margin: 0 0 8px;
        font-size: 30px;
        line-height: 1.2;
        font-weight: 700;
      }

      .game-dom-header p {
        margin: 0;
        color: #8f887b;
      }

      .game-dom-panel h2 {
        margin: 0 0 8px;
        font-size: 18px;
        line-height: 1.35;
        color: #f2eee2;
      }

      .game-dom-footer {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        margin-top: auto;
        color: #8f887b;
        font-size: 14px;
      }

      .codex-entries,
      .return-grid {
        min-height: 0;
        overflow: auto;
      }

      .codex-entry {
        padding: 14px 0;
        border-bottom: 1px solid rgba(140, 128, 108, 0.35);
      }

      .codex-entry h2 {
        margin-bottom: 4px;
      }

      .codex-entry h2 span {
        color: #8f887b;
        font-size: 13px;
        font-weight: 400;
      }

      .codex-entry .meta,
      .summary-line,
      .muted {
        color: #8f887b;
      }

      .return-grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(280px, 0.9fr);
        gap: 28px;
      }

      .return-grid section {
        min-width: 0;
      }

      .item-list,
      .event-list {
        display: grid;
        gap: 6px;
        margin: 8px 0 18px;
      }

      .event-list {
        color: #d8d0c0;
        font-size: 14px;
      }

      .identify-line {
        color: #ffd98a;
      }

      .success {
        color: #99ffd8 !important;
      }

      .danger {
        color: #ff9d8f !important;
      }
    </style>
  </head>
